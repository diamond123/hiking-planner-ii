<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Hiking Planner — SF Bay Area</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%A5%BE</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="turnstile-gate" class="gate">
    <div class="gate-panel">
      <h2>🥾 Hiking Planner</h2>
      <p>Please verify you're human to start planning your hike.</p>
      <div id="turnstile-container"></div>
      <p id="gate-error" class="gate-error"></p>
    </div>
  </div>

  <div class="app" id="app" hidden>
    <header class="app-header">
      <h1>🥾 Hiking Planner</h1>
      <p>Your hiking planning assistant for the San Francisco Bay Area</p>
    </header>

    <div id="examples" class="examples">
      <p class="examples-label">Try asking:</p>
      <div class="example-chips">
        <button type="button" class="example-chip">Find a hiking place in south San Jose with lots of trees</button>
        <button type="button" class="example-chip">Plan an easy hike near Half Moon Bay this weekend</button>
        <button type="button" class="example-chip">I want a hike with great ocean views near Pacifica</button>
        <button type="button" class="example-chip">Looking for a challenging hike with big elevation gain near Mount Diablo</button>
      </div>
    </div>

    <main id="messages" class="messages" aria-live="polite"></main>

    <div id="status" class="status" role="status"></div>

    <form id="chat-form" class="chat-form">
      <input
        id="chat-input"
        type="text"
        placeholder="Tell me about the hike you're looking for..."
        autocomplete="off"
        required
      />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="app.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" defer></script>
</body>
</html>
